<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 96" width="560" height="96">
  <!-- Background -->
  <rect width="560" height="96" fill="#0a0a12" rx="14"/>

  <!-- ZodicogMark — viewBox 0 0 28 28, rendered at 52px → scale = 52/28 = 1.857 -->
  <!-- Centered vertically: translate(22, 48 - 26) = translate(22, 22) -->
  <g transform="translate(22, 22) scale(1.857)">
    <!-- Outer ring -->
    <circle cx="14" cy="14" r="12.5" stroke="white" stroke-width="0.75" stroke-opacity="0.35" fill="none"/>
    <!-- Crown jewel -->
    <circle cx="14" cy="1.5" r="1.25" fill="white" fill-opacity="0.45"/>
    <!-- Z letterform -->
    <path d="M7.5 10.5 H20.5 L7.5 17.5 H20.5"
          stroke="white" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  </g>

  <!-- Wordmark — "Zodicog" white, "AI" violet-400 -->
  <text x="90" y="55"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="800"
        font-size="34"
        letter-spacing="-0.8">
    <tspan fill="white">Zodicog</tspan><tspan fill="#a78bfa">AI</tspan>
  </text>

  <!-- Subtitle -->
  <text x="92" y="75"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="400"
        font-size="11"
        letter-spacing="2.2"
        fill="#d97706"
        opacity="0.55">ASTROLOGICAL INTELLIGENCE</text>
</svg>
