<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200">
  <!-- Background -->
  <rect width="560" height="200" fill="#0a0a12" rx="14"/>

  <!-- ZodicogMark — large hero size, centered, viewBox 0 0 28 28 → 80px → scale = 80/28 = 2.857 -->
  <!-- Center X: 280 - 40 = 240, Center Y: top area ~66px, so translate(240, 26) -->
  <g transform="translate(240, 26) scale(2.857)">
    <!-- Outer ring -->
    <circle cx="14" cy="14" r="12.5" stroke="white" stroke-width="0.75" stroke-opacity="0.35" fill="none"/>
    <!-- Crown jewel -->
    <circle cx="14" cy="1.5" r="1.25" fill="white" fill-opacity="0.45"/>
    <!-- Z letterform -->
    <path d="M7.5 10.5 H20.5 L7.5 17.5 H20.5"
          stroke="white" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  </g>

  <!-- Wordmark — centered below the mark -->
  <text x="280" y="150"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="800"
        font-size="40"
        letter-spacing="-1">
    <tspan fill="white">Zodicog</tspan><tspan fill="#a78bfa">AI</tspan>
  </text>

  <!-- Subtitle -->
  <text x="280" y="174"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="400"
        font-size="11"
        letter-spacing="2.8"
        fill="#d97706"
        opacity="0.55">ASTROLOGICAL INTELLIGENCE</text>
</svg>
